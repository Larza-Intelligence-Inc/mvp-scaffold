# LOCAL development only. Railway does NOT read this file — see the README's
# "Deploying to Railway" section. Run:  docker compose up --build -V
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgres://app:dev@db:5432/app
      FRONTEND_ORIGIN: http://localhost:3000
      # Dev-only secret; replace in real deployments.
      BETTER_AUTH_SECRET: 2hkee/0PTQo7QHLQsAJ7F+WQxnP6qzXF+Tbk4daNRGo=
      BETTER_AUTH_URL: http://localhost:3001
    ports:
      - "3001:3001"
      - "4983:4983"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL_INTERNAL: http://backend:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
